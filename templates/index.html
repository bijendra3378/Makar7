<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAKAR7 Final Fix</title>
    <style>
        body { background: #0f2027; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .container { background: #1c2833; padding: 20px; border-radius: 20px; max-width: 450px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 20px; background: white; padding: 10px; }
        .thumb { width: 100%; height: auto; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MAKAR7 HD</h2>
        <input type="file" id="fileInput">
        <br><br>
        <button onclick="generate()">Generate 8 Photos</button>
        <button onclick="downloadPDF()">Download PDF</button>

        <div id="grid-container" class="grid"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        async function generate() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Select Photo");
            
            const grid = document.getElementById('grid-container');
            grid.innerHTML = "Processing...";
            
            let formData = new FormData();
            formData.append('image', file);
            
            let res = await fetch('/process', { method: 'POST', body: formData });
            let blob = await res.blob();
            let url = URL.createObjectURL(blob);
            
            grid.innerHTML = "";
            for (let i = 0; i < 8; i++) {
                let img = document.createElement('img');
                img.src = url;
                img.className = 'thumb';
                grid.appendChild(img);
            }
        }

        async function downloadPDF() {
            const element = document.getElementById('grid-container');
            if (element.innerHTML === "") return alert("Generate photo first!");
            
            // Failsafe: Wait for all images to load before PDF
            const images = element.querySelectorAll('img');
            await Promise.all(Array.from(images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => img.onload = resolve);
            }));

            html2pdf().from(element).set({
                margin: 0.5,
                filename: 'Makar7-Final.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2 }
            }).save();
        }
    </script>
</body>
</html>
